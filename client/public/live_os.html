.tactical-os .tos-kpi.cyan   .v{ color: var(--tos-neon-cyan); }
.tactical-os .tos-kpi.amber  .v{ color: var(--tos-neon-amber); }
.tactical-os .tos-kpi.red    .v{ color: var(--tos-neon-red); }
.tactical-os .tos-kpi.violet .v{ color: var(--tos-neon-violet); }

.tactical-os .tos-bar{ height:5px; background:rgba(255,255,255,.05); border-radius:3px; overflow:hidden; }
.tactical-os .tos-bar > i{ display:block; height:100%; background:var(--tos-neon-cyan); transition: width .35s ease; }
.tactical-os .tos-bar.green > i{ background: var(--tos-neon-green); }
.tactical-os .tos-bar.amber > i{ background: var(--tos-neon-amber); }
.tactical-os .tos-bar.red   > i{ background: var(--tos-neon-red); }

.tactical-os .tos-list{ list-style:none; padding:0; margin:0; }
.tactical-os .tos-list li{
  display:flex; align-items:center; gap:8px;
  padding: 8px 10px; border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer; transition: background .15s, border-color .15s;
}
.tactical-os .tos-list li:hover{ background: rgba(255,255,255,.025); border-color: var(--tos-bd); }
.tactical-os .tos-list li.active{ background: rgba(34,200,255,.06); border-color: rgba(52,200,255,.35); }

.tactical-os .tos-pitch-wrap{
  position: relative;
  background: radial-gradient(110% 75% at 50% 50%, rgba(16,98,76,.25), rgba(8,18,18,.6)), #0a1612;
  border: 1px solid var(--tos-bd); border-radius: var(--tos-radius);
  overflow: hidden;
}
.tactical-os .tos-pitch-wrap.cyan{ box-shadow: var(--tos-glow-cyan); }

.tactical-os .tos-chip{
  display:inline-flex; align-items:center; gap:5px;
  padding: 3px 8px; border-radius: 8px;
  font-size: 10px; font-family: var(--tos-mono);
  background: rgba(255,255,255,.04); border:1px solid var(--tos-bd); color: var(--tos-tx-2);
}

.tactical-os .tos-btn{
  display:inline-flex; align-items:center; gap:6px;
  font-family: var(--tos-mono); font-size: 11px; letter-spacing: .04em;
  padding: 6px 11px; border-radius: 7px;
  background: rgba(34,200,255,.08); color: var(--tos-neon-cyan);
  border: 1px solid rgba(52,200,255,.35); cursor: pointer;
  transition: background .15s, transform .12s, box-shadow .15s;
}
.tactical-os .tos-btn:hover{ background: rgba(34,200,255,.14); box-shadow: var(--tos-glow-cyan); }
.tactical-os .tos-btn.green{ background: rgba(34,211,154,.08); color: var(--tos-neon-green); border-color: rgba(34,211,154,.35); }
.tactical-os .tos-btn.green:hover{ box-shadow: var(--tos-glow-green); }
.tactical-os .tos-btn.ghost{ background: transparent; color: var(--tos-tx-2); border-color: var(--tos-bd); }
.tactical-os .tos-btn.ghost:hover{ color: var(--tos-tx); }
.tactical-os .tos-btn:active{ transform: translateY(1px); }
.tactical-os .tos-btn[disabled]{ opacity:.4; cursor:not-allowed; }

.tactical-os .tos-input,
.tactical-os .tos-select{
  width:100%; padding: 8px 10px; border-radius: 7px;
  background: rgba(255,255,255,.03); color: var(--tos-tx);
  border: 1px solid var(--tos-bd); font-family: var(--tos-mono); font-size: 12px;
  outline: none; transition: border-color .15s, background .15s;
}
.tactical-os .tos-input:focus,
.tactical-os .tos-select:focus{ border-color: var(--tos-neon-cyan); background: rgba(34,200,255,.04); }

.tactical-os .tos-chat{
  display:flex; flex-direction: column; gap: 8px;
  max-height: 480px; overflow-y: auto;
  scrollbar-width: thin;
}
.tactical-os .tos-chat::-webkit-scrollbar{ width:6px; }
.tactical-os .tos-chat::-webkit-scrollbar-thumb{ background: rgba(255,255,255,.08); border-radius: 4px; }
.tactical-os .tos-msg{ padding: 10px 12px; border-radius: 10px; font-size: 12.5px; line-height: 1.55; }
.tactical-os .tos-msg.user{ background: rgba(52,200,255,.06); border:1px solid rgba(52,200,255,.2); align-self: flex-end; max-width: 88%; }
.tactical-os .tos-msg.agent{ background: rgba(255,255,255,.025); border:1px solid var(--tos-bd); align-self: flex-start; max-width: 92%; }
.tactical-os .tos-msg .who{ display:block; font-size: 9px; letter-spacing:.15em; text-transform: uppercase; color: var(--tos-tx-3); margin-bottom: 4px; }
.tactical-os .tos-msg.thinking{ opacity:.7; font-style: italic; }

.tactical-os .tos-feed{ display:flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y:auto; }
.tactical-os .tos-feed .row{
  display:flex; gap: 8px; align-items:flex-start;
  padding: 6px 8px; border-radius: 7px; border: 1px solid var(--tos-bd);
  background: rgba(255,255,255,.012); font-size: 11.5px;
}
.tactical-os .tos-feed .row .dot{ width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex:none; }
.tactical-os .tos-feed .row .body{ flex:1; min-width: 0; }
.tactical-os .tos-feed .row .ts{ font-family: var(--tos-mono); font-size: 9.5px; color: var(--tos-tx-3); }

.tactical-os .tos-gauge{
  position: relative; height: 86px; border-radius: 8px;
  background: rgba(255,255,255,.018); border:1px solid var(--tos-bd); overflow:hidden;
}
.tactical-os .tos-gauge .fill{
  position: absolute; left: 50%; top: 0; bottom: 0; width: 0;
  background: linear-gradient(90deg, rgba(34,211,154,.25), rgba(34,211,154,.55));
  transition: width .35s ease, left .35s ease, background .35s;
}
.tactical-os .tos-gauge .fill.neg{ background: linear-gradient(90deg, rgba(255,91,110,.55), rgba(255,91,110,.25)); }
.tactical-os .tos-gauge .label{
  position: absolute; inset: 0; display:flex; align-items:center; justify-content:center;
  font-family: var(--tos-mono); font-size: 22px; font-weight: 700; color: var(--tos-tx);
  text-shadow: 0 1px 14px rgba(0,0,0,.4);
}
.tactical-os .tos-gauge .axis{ position: absolute; left:50%; top:0; bottom:0; width:1px; background: rgba(255,255,255,.1); }

.tactical-os .tos-spark{ width:100%; height: 28px; display:block; }

.tactical-os .tos-scrub{
  -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
  background: rgba(255,255,255,.08); border-radius: 3px; outline: none;
}
.tactical-os .tos-scrub::-webkit-slider-thumb{
  -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--tos-neon-cyan); box-shadow: var(--tos-glow-cyan); cursor: pointer; border: 0;
}
.tactical-os .tos-scrub::-moz-range-thumb{
  width: 14px; height: 14px; border-radius: 50%; background: var(--tos-neon-cyan);
  box-shadow: var(--tos-glow-cyan); cursor: pointer; border: 0;
}

.tactical-os .tos-annot-toolbar{ display:flex; gap:6px; flex-wrap:wrap; }
.tactical-os .tos-annot-toolbar .tos-btn.active{ background: rgba(34,200,255,.18); box-shadow: var(--tos-glow-cyan); }
.tactical-os .tos-player-chip{ cursor: grab; }
.tactical-os .tos-player-chip:active{ cursor: grabbing; }

/* ════════════════════════════════════════════════════════════════════════
   FLICKER FIX — permanent targeted CSS compositing fix
   Root cause (confirmed by CSS isolation): backdrop-filter blur forces a
   full GPU layer re-composition on every typing repaint.

   Part 1 — permanent: remove backdrop-filter from the three elements
   that had it. Normal UI animations/transitions are otherwise untouched.

   Part 2 — scoped to modal-open state only: while a .modal-bg is open,
   disable the remaining expensive compositing on the modal content and
   on the background cards that are still painted behind the overlay.
   Specifically strips: box-shadow transition, transform, filter,
   will-change, and animation from background cards/containers.
   border-color transition (cheap, no repaint) is left intact on cards.
   Normal effects resume automatically the moment the modal closes.
   ════════════════════════════════════════════════════════════════════════ */

/* Part 1 — permanent: no backdrop-filter */
.modal-bg       { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
.header         { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
.backend-banner { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }

/* Part 2 — modal content: freeze all compositing while open */
.modal-bg.open,
.modal-bg.open .modal,
.modal-bg.open * {
  transition:  none !important;
  animation:   none !important;
  transform:   none !important;
  filter:      none !important;
  will-change: auto !important;
}

/* Part 2 — background cards: strip only the expensive effects
   (box-shadow & transform transitions, filter, will-change, animation).
   transition: border-color .2s ease is kept — it's paint-free.         */
body:has(.modal-bg.open) .card,
body:has(.modal-bg.open) .pc,
body:has(.modal-bg.open) .player-card,
body:has(.modal-bg.open) .q-card,
body:has(.modal-bg.open) .quantum-card {
  transition:  border-color .2s ease !important;
  transform:   none !important;
  filter:      none !important;
  will-change: auto !important;
  animation:   none !important;
}

/* Part 2 — page containers: no compositing while modal is on top */
body:has(.modal-bg.open) .page,
body:has(.modal-bg.open) #pages-container,
body:has(.modal-bg.open) .content {
  animation:   none !important;
  transform:   none !important;
  filter:      none !important;
  will-change: auto !important;
}
/* ════════════════════════════════════════════════════════════════════ */

/* ════════════════════════════════════════════════════════════════════
   DEEP SPACE NEURAL NETWORK THEME — additive overlay
   Activated on <body class="fos-neural-theme">. Non-destructive.
   ════════════════════════════════════════════════════════════════════ */

:root {
  --fos-bg:        #050816;
  --fos-bg-soft:   #0a0f24;
  --fos-primary:   #00F5FF;
  --fos-secondary: #A855F7;
  --fos-accent:    #FBBF24;
  --fos-glass:     rgba(10, 15, 36, 0.55);
  --fos-glass-bd:  rgba(0, 245, 255, 0.18);
}

/* Body backdrop — deep space gradient + radial nebula */
body.fos-neural-theme{
  background:
    radial-gradient(ellipse at 18% 25%, rgba(0,245,255,0.10), transparent 55%),
    radial-gradient(ellipse at 82% 70%, rgba(168,85,247,0.12), transparent 55%),
    radial-gradient(ellipse at 50% 95%, rgba(251,191,36,0.08), transparent 60%),
    linear-gradient(160deg, var(--fos-bg) 0%, var(--fos-bg-soft) 50%, var(--fos-bg) 100%) !important;
  position: relative;
  min-height: 100vh;
}

/* Animated neural particle layer behind everything (fixed) */
body.fos-neural-theme::before{
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    radial-gradient(1.5px 1.5px at 6%  12%, rgba(0,245,255,0.55), transparent 60%),
    radial-gradient(1.5px 1.5px at 14% 78%, rgba(168,85,247,0.55), transparent 60%),
    radial-gradient(2px   2px   at 27% 42%, rgba(251,191,36,0.50), transparent 60%),
    radial-gradient(1.5px 1.5px at 38% 18%, rgba(0,245,255,0.50), transparent 60%),
    radial-gradient(1.5px 1.5px at 49% 88%, rgba(168,85,247,0.45), transparent 60%),
    radial-gradient(2px   2px   at 58% 35%, rgba(0,245,255,0.55), transparent 60%),
    radial-gradient(1.5px 1.5px at 66% 72%, rgba(251,191,36,0.55), transparent 60%),
    radial-gradient(1.5px 1.5px at 74% 22%, rgba(168,85,247,0.55), transparent 60%),
    radial-gradient(2px   2px   at 81% 58%, rgba(0,245,255,0.50), transparent 60%),
    radial-gradient(1.5px 1.5px at 88% 84%, rgba(251,191,36,0.50), transparent 60%),
    radial-gradient(1.5px 1.5px at 94% 30%, rgba(168,85,247,0.55), transparent 60%);
  animation: fosNeuralDrift 14s ease-in-out infinite alternate;
  opacity: .85;
}

/* Floating connection layer — soft gradient lines + slow drift */
body.fos-neural-theme::after{
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    linear-gradient(115deg, transparent 30%, rgba(0,245,255,0.04) 50%, transparent 70%),
    linear-gradient(245deg, transparent 30%, rgba(168,85,247,0.04) 50%, transparent 70%),
    linear-gradient(35deg,  transparent 35%, rgba(251,191,36,0.025) 55%, transparent 75%);
  animation: fosConnectionDrift 24s ease-in-out infinite alternate;
}

@keyframes fosNeuralDrift{
  0%   { transform: translateY(0)    translateX(0);    opacity: .80; }
  50%  { transform: translateY(-4px) translateX(2px);  opacity: 1; }
  100% { transform: translateY(2px)  translateX(-3px); opacity: .85; }
}
@keyframes fosConnectionDrift{
  0%   { transform: translateX(0)    rotate(0deg);    opacity: .6; }
  100% { transform: translateX(-2px) rotate(0.5deg);  opacity: .85; }
}

/* Sit content above the particle layers */
body.fos-neural-theme .sidebar,
body.fos-neural-theme .content,
body.fos-neural-theme .main-content,
body.fos-neural-theme .topbar,
body.fos-neural-theme .auth-overlay,
body.fos-neural-theme .modal-bg{
  position: relative;
  z-index: 1;
}

/* Glassmorphism for sidebar, top bar and key surfaces */
body.fos-neural-theme .sidebar{
  background:
    linear-gradient(180deg, rgba(10,15,36,0.62) 0%, rgba(5,8,22,0.78) 100%) !important;
  border-right: 1px solid var(--fos-glass-bd) !important;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 0 40px -10px rgba(0,245,255,0.22), 0 0 80px -20px rgba(168,85,247,0.18);
}
body.fos-neural-theme .topbar{
  background: rgba(10,15,36,0.55) !important;
  border-bottom: 1px solid var(--fos-glass-bd) !important;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
body.fos-neural-theme .card,
body.fos-neural-theme .modal{
  background: var(--fos-glass) !important;
  border: 1px solid var(--fos-glass-bd) !important;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 12px 40px -16px rgba(0,0,0,0.7), 0 0 24px -10px rgba(0,245,255,0.20);
}

/* Active nav item — primary cyan accent + faint holographic glow */
body.fos-neural-theme .nav-item.active{
  background: linear-gradient(90deg, rgba(0,245,255,0.18), rgba(168,85,247,0.10)) !important;
  color: var(--fos-primary) !important;
  border-color: rgba(0,245,255,0.32) !important;
  box-shadow: 0 0 18px -4px rgba(0,245,255,0.40), inset 0 0 14px -8px rgba(0,245,255,0.30);
}
body.fos-neural-theme .nav-item.active::before{
  background: linear-gradient(180deg, var(--fos-primary), var(--fos-secondary)) !important;
  box-shadow: 0 0 8px var(--fos-primary);
}
body.fos-neural-theme .nav-item:hover{
  background: rgba(0,245,255,0.05);
  color: var(--tx);
}

/* Tier headers — keep gold/cyan/violet but add inner glow shadow */
body.fos-neural-theme .sidebar-nav > .nav-section:nth-of-type(1){
  background: linear-gradient(90deg, rgba(251,191,36,0.10), transparent 80%);
}
body.fos-neural-theme .sidebar-nav > .nav-section:nth-of-type(2){
  background: linear-gradient(90deg, rgba(0,245,255,0.10), transparent 80%);
}
body.fos-neural-theme .sidebar-nav > .nav-section:nth-of-type(3){
  background: linear-gradient(90deg, rgba(168,85,247,0.12), transparent 80%);
}

/* Holographic card helper — for opt-in elements */
.fos-holo-card{
  position: relative;
  background: linear-gradient(135deg, rgba(0,245,255,0.06), rgba(168,85,247,0.06));
  border: 1px solid rgba(0,245,255,0.28);
  border-radius: 16px;
  padding: 18px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow:
    0 14px 40px -16px rgba(0,0,0,0.6),
    0 0 30px -10px rgba(0,245,255,0.34),
    0 0 24px -10px rgba(168,85,247,0.26);
  overflow: hidden;
}
.fos-holo-card::before{
  content: '';
  position: absolute;
  inset: -50%;
  background: conic-gradient(from 0deg,
    transparent 0%, rgba(0,245,255,0.22) 12%,
    transparent 24%, rgba(168,85,247,0.22) 38%,
    transparent 52%, rgba(251,191,36,0.18) 66%,
    transparent 78%, rgba(0,245,255,0.22) 92%,
    transparent 100%);
  animation: fosHoloSweep 8s linear infinite;
  pointer-events: none;
  opacity: 0.30;
}
.fos-holo-card > *{ position: relative; z-index: 1; }
@keyframes fosHoloSweep{
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Live AI pulse indicator — drop on any element with .fos-ai-pulse */
.fos-ai-pulse{
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--fos-primary);
  text-shadow: 0 0 10px rgba(0,245,255,0.55);
  padding: 4px 11px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(0,245,255,0.18), rgba(168,85,247,0.16));
  border: 1px solid rgba(0,245,255,0.40);
}
.fos-ai-pulse::before{
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #DBFEFF, var(--fos-primary));
  box-shadow:
    0 0 8px var(--fos-primary),
    0 0 14px rgba(0,245,255,0.6),
    0 0 22px rgba(168,85,247,0.4);
  animation: fosAIPulse 1.2s ease-in-out infinite;
}
@keyframes fosAIPulse{
  0%, 100% { transform: scale(0.92); opacity: 0.7; box-shadow: 0 0 6px var(--fos-primary); }
  50%      { transform: scale(1.18); opacity: 1;   box-shadow: 0 0 14px var(--fos-primary), 0 0 22px rgba(168,85,247,0.6); }
}

/* Animated tenant status (FC Familista ACTIVE) — upgrade existing badge */
body.fos-neural-theme .tenant-active-badge{
  background:
    linear-gradient(90deg, rgba(0,245,255,0.20), rgba(34,211,154,0.30), rgba(168,85,247,0.20)) !important;
  background-size: 200% 100% !important;
  color: #DBFEFF !important;
  border-color: rgba(0,245,255,0.50) !important;
  text-shadow: 0 0 8px rgba(0,245,255,0.65) !important;
  box-shadow:
    0 0 12px rgba(0,245,255,0.55),
    0 0 22px rgba(168,85,247,0.35),
    inset 0 0 8px rgba(0,245,255,0.25) !important;
  animation: fosTenantStatus 3s ease-in-out infinite, fosTenantSweep 4.5s linear infinite !important;
}
@keyframes fosTenantStatus{
  0%, 100% { box-shadow: 0 0 10px rgba(0,245,255,0.40), 0 0 18px rgba(168,85,247,0.28); transform: scale(1); }
  50%      { box-shadow: 0 0 18px rgba(0,245,255,0.75), 0 0 30px rgba(168,85,247,0.50); transform: scale(1.03); }
}
@keyframes fosTenantSweep{
  0%   { background-position: 0%   0%; }
  100% { background-position: 200% 0%; }
}

/* Tenant placeholder hover — add neural shimmer on hover */
body.fos-neural-theme .nav-tenant-placeholder:hover{
  background: linear-gradient(90deg, rgba(168,85,247,0.08), rgba(0,245,255,0.05)) !important;
  border-left-color: rgba(168,85,247,0.60) !important;
  box-shadow: inset 0 0 12px -4px rgba(168,85,247,0.25);
}

/* Section heading text shadow — make tier headers feel holographic */
body.fos-neural-theme .nav-section{
  background-clip: padding-box;
}

/* Optional: live data stream helper class */
.fos-stream-line{
  position: relative;
  overflow: hidden;
}
.fos-stream-line::after{
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,245,255,0.18), transparent);
  animation: fosStreamSweep 2.4s linear infinite;
}
@keyframes fosStreamSweep{
  0%   { left: -100%; }
  100% { left: 100%; }
}

/* Reduced motion — calm everything down */
@media (prefers-reduced-motion: reduce){
  body.fos-neural-theme::before,
  body.fos-neural-theme::after,
  .fos-holo-card::before,
  .fos-ai-pulse::before,
  body.fos-neural-theme .tenant-active-badge,
  .fos-stream-line::after{
    animation: none !important;
  }
}

/* ════════════════════════════════════════════════════════════════════
   FOS STABILITY LAYER — eliminates platform-wide shaking / jitter
   ────────────────────────────────────────────────────────────────────
   Diagnosis (verified in code, not guessed):
     1. body.fos-neural-theme::before  (line 1783) animates
        transform: translateY/X on a position:fixed; inset:0 overlay
        covering the whole viewport — every 14 s the entire screen
        repaints with a subpixel shift, creating perceptible jitter
        on every page that uses the FOS theme.
     2. body.fos-neural-theme::after   (line 1798) animates
        transform: translateX + rotate(0.5deg) on a second
        full-viewport overlay — the 0.5 deg rotation is the worst
        offender; it tilts the underlying repaint area.
     3. Dozens of *-tile / *-shield / *-card / .card.clickable /
        .match-row / .btn-primary :hover rules use
        transform: translateY(-1px) — every card pops up 1 px on
        hover, which reads as "shaking" when the cursor sweeps a
        grid of tiles.
     4. .fos-ai-pulse::before scales 0.92 → 1.18 and
        .tenant-active-badge scales 1 → 1.03 — both small but
        contribute to the overall "alive" jitter feel.
     5. .fos-holo-card::before performs a 360 deg rotation on a
        conic-gradient pseudo — expensive on weaker GPUs and can
        cause shimmer-shake.
   What stays (visual identity is fully preserved):
     • All gradient backgrounds, glow shadows, neon colors, blurs
     • Opacity-based fades on overlays
     • Background-position sweeps (e.g. fosTenantSweep)
     • All layouts, palettes, page IDs, helpers, data contracts,
       sidebar, render functions
   What changes (transforms only):
     • Full-viewport overlays no longer translate or rotate.
     • Hover lifts are removed — cards keep their border/shadow
       hover effect without moving 1 px upward.
     • Scale-based pulses are stopped — glow remains static.
   This block lives at end-of-file so it wins on cascade source
   order; no existing rule is rewritten.
   ──────────────────────────────────────────────────────────────── */

/* 1 · Full-viewport background overlays — drop transform animation.
      Gradient look stays exactly the same; the screen no longer
      subpixel-shifts under content. */
body.fos-neural-theme::before,
body.fos-neural-theme::after{
  animation: none !important;
  transform: none !important;
}

/* 2 · Holographic conic sweep on cards — keep the gradient, stop the
      rotation so cards don't appear to shimmer-shake. */
.fos-holo-card::before{
  animation: none !important;
  transform: none !important;
}

/* 3 · AI pulse indicator — keep the glowing dot, stop the scale.
      Glow is preserved via static box-shadow. */
.fos-ai-pulse::before{
  animation: none !important;
  transform: none !important;
  box-shadow:
    0 0 10px var(--fos-primary, #00F5FF),
    0 0 18px rgba(0,245,255,0.55),
    0 0 26px rgba(168,85,247,0.40) !important;
}

/* 4 · Tenant active badge — keep the gradient sweep, drop the scale
      pulse so the badge no longer "breathes". */
body.fos-neural-theme .tenant-active-badge{
  animation: fosTenantSweep 4.5s linear infinite !important;
  transform: none !important;
}

/* 5 · Live stream line sweep — disable; it's purely decorative motion. */
.fos-stream-line::after{ animation: none !important; }

/* 6 · Inline per-centre pulse keyframes inserted by helper render
      functions (aix-pulse / pres-pulse / chm-pulse / war-pulse /
      fos-pulse / orc-pulse / gis-pulse / orc-stars / kg-orb /
      ai-orb-pulse / ai-live-blink / pc-foil-shimmer / tos-pulse /
      dotPulse / badgePulse / tenantPulse / dnaSweep / radarPulse /
      chemFlow / quantumRotate / energySpin / typBounce). Disable
      the transform property platform-wide while keeping opacity
      transitions where they don't shift layout.
      Achieved by overriding `animation-name` ONLY for elements
      that have these as inline-style. Easier: kill all transform
      animations that target the well-known pulse class hooks. */
[class*="-pulse"]:not(.fos-ai-pulse):not(.dev-pulse):not(.chip-dot-live),
[class*="ai-orb"],
[class*="-shimmer"]{
  animation: none !important;
  transform: none !important;
}

/* 7 · Hover lifts that cause "jump" — remove the translateY but keep
      the color / border / shadow change. Targets every common tile,
      shield, card, and row class used across FOS centres. */
.card.clickable:hover,
.match-row:hover,
.login-btn:hover,
.btn-primary:hover,
[class*="-tile"]:hover,
[class*="-shield"]:hover,
[class*="-node"]:hover,
[class*="-kpi"]:hover,
[class*="-row"]:hover{
  transform: none !important;
}

/* 8 · (Removed — previous backface-visibility:hidden promotion was the
      WRONG fix and caused independent GPU layers per card to
      re-rasterize their backdrop-filter blur during scroll, which
      reads as subpixel shake. See Stability Layer v2 below.) */
/* END FOS STABILITY LAYER v1 ─────────────────────────────────── */


/* ════════════════════════════════════════════════════════════════════
   FOS STABILITY LAYER v2 — eliminates RESIDUAL scroll/paint jitter
   ────────────────────────────────────────────────────────────────────
   Root causes verified after v1 failed to fully stabilise pages:

     A. body.fos-neural-theme .card { backdrop-filter: blur(10px) }
        (app.css:1841). Every FOS card paints a live blur of the body
        gradient behind it. When the page scrolls, every visible card
        has to recompose its blurred surface — on a wide FOS dashboard
        with 10-20 cards, this is the dominant GPU cost and the source
        of micro-shimmer that reads as "shaking".

     B. Stability Layer v1 section 8 added backface-visibility:hidden
        to [class*="-card"], which promoted every FOS card to its own
        compositor layer. Combined with (A), each card layer
        re-rasterizes independently — pixel-rounding differences
        between layers manifest as subpixel jitter between cards.

     C. .page { animation: fadeIn .2s ease both } with
        @keyframes fadeIn{from{transform:translateY(5px)}…} (app.css
        line 340/342). Every navigation shifts the page 5 px upward
        as it fades in — rapid navigation amplifies this into flicker.

     D. Default overflow-anchor:auto causes the browser to re-anchor
        scroll position when content size changes above the viewport.
        FOSTelemetry-driven KPI numbers updating can trigger this.

   What stays (visual identity preserved):
     • Sidebar + topbar backdrop-filter blur (they don't scroll with
       content — blur stays cheap)
     • Translucent card backgrounds (--fos-glass rgba(10,15,36,0.55))
     • All glow box-shadows, gradient backgrounds, neon palette
     • Page fade transition (opacity-only — no slide)

   What changes (paint cost + scroll anchoring only):
     • Card backdrop-filter disabled — cards still look translucent
       because background is already rgba(0.55); the body gradient
       shows through softly without the blur.
     • backface-visibility:hidden on cards removed (v1 mistake).
     • Page fade keeps opacity, drops the 5 px translateY.
     • overflow-anchor:none on .page suppresses scroll-anchor jumps.
   ──────────────────────────────────────────────────────────────── */

/* A. Cards: drop the expensive backdrop-filter — keep the translucent
      glass-look via the existing rgba background + border + glow. */
body.fos-neural-theme .card,
body.fos-neural-theme .modal,
body.fos-neural-theme .fos-holo-card,
body.fos-neural-theme [class*="-card"]{
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}

/* B. Reset compositor-layer promotion from v1 — let the browser
      composite cards on the main layer where they don't shimmer. */
body.fos-neural-theme .card,
body.fos-neural-theme .fos-holo-card,
body.fos-neural-theme [class*="-card"]{
  backface-visibility: visible;
  -webkit-backface-visibility: visible;
  will-change: auto;
}

/* C. Page fade — opacity only, no 5 px slide that reads as a jump on
      rapid navigation. Overrides the inherited fadeIn keyframe by
      naming a stability-specific keyframe. */
@keyframes fosPageFadeIn{ from{opacity:0} to{opacity:1} }
.page{
  animation-name: fosPageFadeIn !important;
  animation-duration: .15s !important;
  animation-timing-function: ease !important;
  animation-fill-mode: both !important;
}

/* D. Suppress browser scroll-anchoring. Without this, KPI counter
      updates above the viewport can silently nudge the visible
      content downward. */
.page, .content, body.fos-neural-theme{
  overflow-anchor: none;
}
/* END FOS STABILITY LAYER v2 ─────────────────────────────────── */


/* ════════════════════════════════════════════════════════════════════
   FOS STABILITY LAYER v3 — residual CLS (scrollbar gutter + tabular nums)
   ────────────────────────────────────────────────────────────────────
   Verified residual causes after v1 + v2 fixes:

     1. No `scrollbar-gutter: stable` anywhere in app.css. When a FOS
        page first paints, content fits in the viewport — no vertical
        scrollbar. Once data arrives and the dashboard expands, the
        scrollbar appears (~15-17 px) and EVERY pixel of FOS content
        shifts left to make room. Repeated on every navigation
        between pages of different heights. This is the dominant
        remaining horizontal-shift source on FOS pages.

     2. No `font-variant-numeric: tabular-nums` anywhere. Even with
        `font-family: var(--mono)` (JetBrains Mono), some browsers
        render proportional figures by default — and even with
        equal-width digits, `5` vs `127` vs `1000` are different
        total widths. Centered KPI values visibly jump inside their
        tiles when counters update (Observability API calls, SOC
        Security Score, Predictive Confidence, Exec Bridge KPIs,
        etc.).

   What stays:
     • All layouts, grids, palettes, typography, page IDs, helpers
     • All v1 + v2 stability rules
     • Glow shadows, gradient backgrounds, neon colors
     • Translucent card backgrounds

   What changes:
     • `scrollbar-gutter: stable` on html + body — vertical scrollbar
       space is reserved even when content fits; the slim gutter
       stays empty until needed. No more horizontal layout snap on
       navigation between short/tall pages.
     • `font-variant-numeric: tabular-nums` inherited from FOS theme
       root — every KPI digit occupies the same width as every other
       digit, so number changes don't shift centered text.

   Zero visual cost. Two CSS properties. Verified causes only.
   ──────────────────────────────────────────────────────────────── */

/* 1. Reserve scrollbar space — prevents the universal 15 px horizontal
      shift when a FOS page's content first exceeds viewport height. */
html, body{
  scrollbar-gutter: stable;
}
.page, .content{
  scrollbar-gutter: stable;
}

/* 2. Equal-width digits for every KPI value rendered in FOS theme.
      Inherits to every child — covers every var(--mono) tile, every
      KPI val, every counter, every percentage, every score. */
body.fos-neural-theme{
  font-variant-numeric: tabular-nums;
}
/* END FOS STABILITY LAYER v3 ─────────────────────────────────── */


/* ════════════════════════════════════════════════════════════════════
   PHASE A · Navigation cleanup utility
   ────────────────────────────────────────────────────────────────────
   `.hidden` is used on `.nav-item` rows that are temporarily hidden
   from the sidebar but kept in the DOM so they remain reachable by
   data-page routing (programmatic navTo). One class removal restores
   them. No styling on the items themselves changes.
   ──────────────────────────────────────────────────────────────── */
.hidden{ display: none !important; }


/* ════════════════════════════════════════════════════════════════════
   PHASE B.1 · FOUNDATION — Premium Club Theme (FC Familista)
   ────────────────────────────────────────────────────────────────────
   Top Eleven-inspired premium football management identity.
   • Tokens defined under `body.club-theme` (default-on via boot IIFE)
   • Coexists with `body.fos-neural-theme` — club-theme rules win on
     source order so the chrome (sidebar + topbar) gets the new look
     without touching FOS page bodies.
   • Sidebar splits visually into PLATFORM (royal indigo accent) and
     CLUB WORKSPACE (pitch green accent + club emblem prominence).
   • Topbar carries the club emblem + dual-line title/subtitle.
   • Mobile-first: ≤ 600 px collapses sidebar to slide-over drawer.
   • Preserves all stability layer rules (v1, v2, v3).
   ──────────────────────────────────────────────────────────────── */

/* ── 1 · Design tokens ─────────────────────────────────────────── */
body.club-theme{
  /* Surfaces */
  --bg-canvas:      #0A0E1A;
  --bg-surface:     #131826;
  --bg-elevated:    #1A2236;
  --bg-sunken:      #070A14;
  /* Borders */
  --b-subtle:       #1E263B;
  --b-default:      #232B41;
  --b-strong:       #2D3756;
  /* Text */
  --t-primary:      #F1F5F9;
  --t-secondary:    #94A3B8;
  --t-tertiary:     #64748B;
  --t-disabled:     #475569;
  /* Club / Pitch accent */
  --pitch-400:      #4ADE80;
  --pitch-500:      #22C55E;
  --pitch-600:      #16A34A;
  --pitch-700:      #15803D;
  --pitch-800:      #166534;
  --pitch-glow:     rgba(34,197,94,0.20);
  /* Platform / Royal accent */
  --royal-400:      #A5B4FC;
  --royal-500:      #818CF8;
  --royal-600:      #6366F1;
  --royal-700:      #4F46E5;
  --royal-glow:     rgba(99,102,241,0.20);
  /* Gold (premium / value / rating) */
  --gold-400:       #FACC15;
  --gold-500:       #EAB308;
  --gold-glow:      rgba(234,179,8,0.22);
  /* Semantic */
  --c-success:      #22C55E;
  --c-warning:      #F59E0B;
  --c-critical:     #EF4444;
  --c-info:         #38BDF8;
  /* Spacing scale (4 px base) */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;
  --sp-14: 56px; --sp-20: 80px;
  /* Radius */
  --r-sm: 6px;  --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
  /* Shadows */
  --sh-1: 0 1px 3px rgba(0,0,0,0.40);
  --sh-2: 0 8px 24px rgba(0,0,0,0.45);
  --sh-3: 0 24px 56px rgba(0,0,0,0.55);
  /* Topbar height */
  --topbar-h: 64px;
}
@media (max-width: 600px){
  body.club-theme{ --topbar-h: 56px; }
}

/* ── 2 · App body + canvas ─────────────────────────────────────── */
body.club-theme{
  background: var(--bg-canvas) !important;
  color: var(--t-primary);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  /* Static premium backdrop — no animation, no jitter risk */
  background-image:
    radial-gradient(1100px 600px at 110% -10%, rgba(34,197,94,0.07), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(99,102,241,0.06), transparent 60%) !important;
}

/* ── 3 · Topbar (the new header) ───────────────────────────────── */
body.club-theme .header,
body.club-theme .topbar{
  height: var(--topbar-h) !important;
  min-height: var(--topbar-h) !important;
  padding: 0 var(--sp-6) !important;
  background: linear-gradient(180deg, rgba(13,17,28,0.92), rgba(13,17,28,0.78)) !important;
  border-bottom: 1px solid var(--b-default) !important;
  display: flex; align-items: center; gap: var(--sp-4);
  position: sticky; top: 0; z-index: 80;
  /* Sidebar/topbar keep backdrop-filter — they don't scroll with content (stability v2) */
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
body.club-theme .header-left{
  display: flex; align-items: center; gap: var(--sp-3); min-width: 0;
}
body.club-theme .topbar-menu-btn{
  display: none; /* shown on mobile */
  background: transparent; border: 1px solid var(--b-default); color: var(--t-secondary);
  width: 36px; height: 36px; border-radius: var(--r-md); cursor: pointer;
  align-items: center; justify-content: center;
}
body.club-theme .topbar-menu-btn:hover{ background: var(--bg-elevated); color: var(--t-primary); }
@media (max-width: 1023px){
  body.club-theme .topbar-menu-btn{ display: inline-flex; }
}
body.club-theme .topbar-brand{
  display: flex; align-items: center; gap: var(--sp-3); text-decoration: none; min-width: 0;
  cursor: pointer; padding: 4px var(--sp-2); border-radius: var(--r-md);
}
body.club-theme .topbar-brand:hover{ background: var(--bg-elevated); }

/* ── Topbar context Back button (Owner Home / Clubs picker target) ── */
body.club-theme .topbar-back{
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; border: 1px solid var(--b-default);
  color: var(--t-secondary); cursor: pointer;
  padding: 6px 10px; border-radius: var(--r-md);
  font-size: 13px; font-weight: 600; line-height: 1;
  margin-right: var(--sp-2);
  transition: background .15s ease, color .15s ease, border-color .15s ease;
}
body.club-theme .topbar-back:hover{
  background: var(--bg-elevated); color: var(--t-primary);
  border-color: var(--b-strong, var(--b-default));
}
body.club-theme .topbar-back:focus-visible{
  outline: 2px solid var(--pitch-600); outline-offset: 2px;
}
body.club-theme .topbar-back svg{ display: block; flex-shrink: 0; }
body.club-theme.area-home .topbar-back{ display: none !important; }

/* ── Club Home Dashboard (chd-* namespace) ─────────────────────────────────
   12-column responsive CSS grid.
   Widget span is set via inline  style="grid-column:span N"  from HOME_WIDGETS.cols.
   chd-grid → chd-widget → chd-widget-header + chd-widget-body
   ─────────────────────────────────────────────────────────────────────────── */
body.club-theme #pg-club-home{
  background: var(--bg-canvas, #0C1120);
  min-height: calc(100vh - var(--topbar-h, 56px));
  overflow-y: auto;
}

/* ── 12-col grid ── */
body.club-theme .chd-grid{
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
  padding: 20px 24px 48px;
  max-width: 1280px;
  margin: 0 auto;
  box-sizing: border-box;
}

/* Tablet: collapse to 8 cols */
@media (max-width: 1024px){
  body.club-theme .chd-grid{ grid-template-columns: repeat(8, 1fr); }
}

/* Mobile: single column */
@media (max-width: 640px){
  body.club-theme .chd-grid{
    grid-template-columns: 1fr;
    padding: 12px 14px 32px;
    gap: 12px;
  }
  body.club-theme .chd-grid [style*="grid-column"]{
    grid-column: 1 / -1 !important;
  }
}

/* ── Base widget card ── */
body.club-theme .chd-widget{
  background: var(--bg-elevated, #131A2D);
  border: 1px solid var(--b-default, #1E293B);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 100px;
  transition: border-color 0.15s ease;
}
body.club-theme .chd-widget:hover{
  border-color: var(--b-strong, #334155);
}

/* Widget title bar */
body.club-theme .chd-widget-header{
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--b-default, #1E293B);
}
body.club-theme .chd-widget-icon{
  width: 18px; height: 18px;
  flex-shrink: 0;
}
body.club-theme .chd-widget-title{
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--t-secondary, #64748B);
}

/* Widget body */
body.club-theme .chd-widget-body{
  padding: 16px 18px;
  flex: 1;
}

/* Error fallback */
body.club-theme .chd-widget-error{
  color: var(--t-tertiary, #475569);
  font-size: 12px;
  text-align: center;
  padding: 20px 0;
}

/* ── Widget: Club Header (hero) ── */
body.club-theme #chd-w-club-header{
  background:
    radial-gradient(ellipse 80% 55% at 50% 0%, rgba(34,197,94,0.12) 0%, transparent 70%),
    linear-gradient(180deg, var(--bg-elevated, #131A2D) 0%, var(--bg-canvas, #0C1120) 100%);
  border-bottom: 1px solid var(--b-default, #1E293B);
  position: relative;
}
body.club-theme #chd-w-club-header::before{
  content: '';
  position: absolute;
  inset: 0 0 auto 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, var(--pitch-500, #22C55E) 50%, transparent 100%);
}
body.club-theme #chd-wb-club-header{
  padding: 44px 32px 36px;
}
body.club-theme .chd-hero-inner{
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 18px;
}
body.club-theme .chd-hero-crest{
  width: 88px; height: 88px;
  border-radius: 50%;

  border: 2px solid rgba(34,197,94,0.35);

}
body.club-theme .chd-hero-crest--text{
  display: inline-flex;
  align-items: center;
  justify-content: center;

body.club-theme .chd-hero-text{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
body.club-theme .chd-hero-name{

.sqf-sl{ font-size: 9.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #717f96; }
.sqf-sv{ font-size: 16px; font-weight: 600; color: #eef2f8; margin-top: 3px; letter-spacing: -.3px; }

.sqf-btn{
  display: flex;

.sqf-btn .a{
  width: 28px;
  height: 28px;
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(var(--ac),.26);

@media (max-width: 1100px){

}

/* Squad · Lineup — players table */
.sql-tabs{ display:flex; gap:6px; margin-top:18px; }

  appearance:none; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.03);

  padding:8px 18px; border-radius:10px; cursor:pointer; transition:all .16s ease;
}
.sql-tab:hover{ color:var(--tx-1,#f1f5f9); background:rgba(255,255,255,.06); }
.sql-tab.is-active{ color:#0b1020; background:#f4b740; border-color:#f4b740; cursor:default; }
.sql-meta{ display:flex; align-items:baseline; gap:10px; padding:22px 32px 12px; }
.sql-meta-title{ font-size:18px; font-weight:700; color:var(--tx-1,#f1f5f9); letter-spacing:-.3px; }
.sql-meta-count{ font-size:12.5px; color:var(--tx-3,#7e8aa0); }
.sql-tablewrap{ padding:0 32px 48px; overflow-x:auto; }
.sql-table{ width:100%; border-collapse:separate; border-spacing:0; min-width:880px; }
.sql-table thead th{
  text-align:left; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:var(--tx-3,#6f7c92); padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.1); white-space:nowrap;
}

.sql-table tbody td{

}
.sql-table tbody td:first-child{ padding-left:14px; }

.sql-pos{

  border-radius:6px; font-size:10.5px; font-weight:800; letter-spacing:.02em;
}
.sql-pos--gk{ background:rgba(245,158,11,.16); color:#fbbf24; border:1px solid rgba(245,158,11,.32); }
.sql-pos--df{ background:rgba(56,189,248,.14); color:#7dd3fc; border:1px solid rgba(56,189,248,.3); }
.sql-pos--mf{ background:rgba(52,211,153,.14); color:#6ee7b7; border:1px solid rgba(52,211,153,.3); }
.sql-pos--fw{ background:rgba(244,63,94,.15); color:#fb7185; border:1px solid rgba(244,63,94,.32); }
.sql-c-num{ color:var(--tx-3,#7e8aa0); font-weight:700; font-variant-numeric:tabular-nums; }
.sql-name{ display:inline-flex; align-items:center; gap:7px; color:var(--tx-1,#f1f5f9); font-weight:600; }
.sql-capt{
  display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:50%;
  background:#f4b740; color:#0b1020; font-size:9px; font-weight:800;
}
.sql-c-roles{ color:var(--tx-3,#8b95a8); font-size:12px; }
.sql-c-nat{ }
.sql-flag{ font-size:15px; margin-right:6px; }
.sql-natc{ font-size:11px; color:var(--tx-3,#7e8aa0); font-weight:600; }
.sql-c-age,.sql-c-val{ font-variant-numeric:tabular-nums; }
.sql-c-val{ font-weight:600; color:var(--tx-1,#e8edf5); }
.sql-form{ display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; }
.sql-form--up{ color:#4ade80; }
.sql-form--mid{ color:#fbbf24; }
.sql-form--down{ color:#f87171; }
.sql-condwrap{ display:flex; align-items:center; gap:8px; min-width:120px; }
.sql-condwrap > span{ font-size:11px; color:var(--tx-3,#8b95a8); font-variant-numeric:tabular-nums; width:32px; }
.sql-bar{ flex:1; height:6px; border-radius:100px; background:rgba(255,255,255,.09); overflow:hidden; min-width:54px; }
.sql-bar-fill{ height:100%; border-radius:100px; }
.sql-bar-fill.is-hi{ background:linear-gradient(90deg,#22c55e,#4ade80); }
.sql-bar-fill.is-mid{ background:linear-gradient(90deg,#d97706,#fbbf24); }
.sql-bar-fill.is-lo{ background:linear-gradient(90deg,#dc2626,#f87171); }
.sql-mor{ display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--tx-2,#cbd5e1); }
.sql-mor i{ width:8px; height:8px; border-radius:50%; display:inline-block; }
.sql-mor--exc i{ background:#4ade80; } .sql-mor--good i{ background:#34d399; }
.sql-mor--ok i{ background:#fbbf24; }  .sql-mor--low i{ background:#f87171; }
.sql-qual{
  display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:28px; padding:0 8px;
  border-radius:8px; font-size:14px; font-weight:800; font-variant-numeric:tabular-nums;
}
.sql-qual--elite{ background:rgba(74,222,128,.16); color:#86efac; border:1px solid rgba(74,222,128,.34); }
.sql-qual--good{ background:rgba(56,189,248,.15); color:#7dd3fc; border:1px solid rgba(56,189,248,.32); }
.sql-qual--ok{ background:rgba(251,191,36,.15); color:#fcd34d; border:1px solid rgba(251,191,36,.32); }
.sql-qual--avg{ background:rgba(148,163,184,.14); color:#cbd5e1; border:1px solid rgba(148,163,184,.3); }

/* Squad · player profile modal */
.sq-plm{ position:fixed; inset:0; z-index:4000; display:flex; align-items:center; justify-content:center; padding:24px; }
.sq-plm-backdrop{ position:absolute; inset:0; background:rgba(3,6,15,.72); backdrop-filter:blur(3px); }

.sq-plm-avatar{
  width:60px; height:60px; border-radius:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:800; letter-spacing:.5px;
}
.sq-plm-id{ flex:1; min-width:0; }
.sq-plm-name{ display:flex; align-items:center; gap:9px; font-size:21px; font-weight:700; color:#f5f8fc; letter-spacing:-.4px; }
.sq-plm-sub{ display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-top:7px; font-size:12.5px; color:#94a3b8; }
.sq-plm-qual{ display:flex; flex-direction:column; align-items:center; padding:8px 16px; border-radius:14px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); }
.sq-plm-qual-n{ font-size:26px; font-weight:800; color:#f5f8fc; line-height:1; }
.sq-plm-qual-l{ font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#7e8aa0; margin-top:4px; }
.sq-plm-body{ display:flex; min-height:0; flex:1; }
.sq-plm-side{ flex-shrink:0; width:178px; padding:14px; display:flex; flex-direction:column; gap:4px; border-right:1px solid rgba(255,255,255,.08); background:rgba(0,0,0,.16); }
.sq-plm-tab{
  appearance:none; text-align:left; border:none; background:none; color:var(--tx-3,#94a3b8);
  font-size:13.5px; font-weight:600; padding:10px 12px; border-radius:9px; cursor:pointer; transition:all .14s ease;
}
.sq-plm-tab:hover{ color:#f1f5f9; background:rgba(255,255,255,.05); }
.sq-plm-tab.is-active{ color:#0b1020; background:#f4b740; }
.sq-plm-content{ flex:1; min-width:0; overflow-y:auto; padding:20px 24px; }
.sq-panel{ display:flex; flex-direction:column; }
.sq-sec-title{ font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--tx-3,#6f7c92); margin:4px 0 12px; }
.sq-sec-title + *{ margin-bottom:18px; }
.sq-kv-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06); border-radius:12px; overflow:hidden; }
.sq-kv{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 14px; background:#0e1626; }
.sq-kv-l{ font-size:12px; color:var(--tx-3,#7e8aa0); }
.sq-kv-v{ font-size:13px; font-weight:600; color:var(--tx-1,#eef2f8); text-align:right; }
.sq-meters{ display:flex; flex-direction:column; gap:13px; }
.sq-meter-top{ display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; color:var(--tx-2,#cbd5e1); }
.sq-meter-top span:last-child{ font-weight:700; color:var(--tx-1,#eef2f8); }
.sq-meter .sql-bar{ height:8px; }
.sq-attrs{ display:grid; grid-template-columns:1fr 1fr; gap:10px 22px; }
.sq-attr{ display:flex; align-items:center; gap:9px; }
.sq-attr-l{ flex:0 0 96px; font-size:12px; color:var(--tx-2,#aab4c5); white-space:nowrap; }
.sq-attr .sql-bar{ flex:1; height:7px; }
.sq-attr-v{ flex:0 0 22px; text-align:right; font-size:12px; font-weight:700; color:var(--tx-1,#eef2f8); font-variant-numeric:tabular-nums; }
.sq-skillgrp{ margin-bottom:18px; }
.sq-skillgrp-hd{ display:flex; align-items:center; justify-content:space-between; margin-bottom:11px; }
.sq-skillgrp-hd span:first-child{ font-size:13.5px; font-weight:700; color:var(--tx-1,#f1f5f9); }
.sq-skillgrp-avg{ font-size:12px; font-weight:800; color:#0b1020; background:#f4b740; padding:2px 9px; border-radius:7px; }
.sq-traits{ display:flex; flex-wrap:wrap; gap:8px; }
.sq-trait{ font-size:12.5px; color:#c4d0e0; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); padding:7px 12px; border-radius:9px; }
.sq-st-table{ width:100%; border-collapse:collapse; }
.sq-st-table th{ text-align:right; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--tx-3,#6f7c92); padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.1); }
.sq-st-table th:first-child{ text-align:left; }
.sq-st-table td{ text-align:right; font-size:13px; color:var(--tx-2,#cbd5e1); padding:9px 10px; border-bottom:1px solid rgba(255,255,255,.05); font-variant-numeric:tabular-nums; }
.sq-st-comp{ text-align:left !important; color:var(--tx-1,#eef2f8) !important; font-weight:600; }
.sq-st-tot td{ border-top:1px solid rgba(255,255,255,.14); border-bottom:none; font-weight:700; color:var(--tx-1,#f1f5f9); }
.sq-rate{ display:inline-block; min-width:38px; padding:2px 7px; border-radius:6px; background:rgba(52,211,153,.14); color:#6ee7b7; font-weight:700; font-size:12px; }
.sq-note{ margin-top:6px; font-size:12px; color:var(--tx-3,#7e8aa0); font-style:italic; }
@media (max-width:720px){
  .sq-plm-body{ flex-direction:column; }
  .sq-plm-side{ width:auto; flex-direction:row; overflow-x:auto; border-right:none; border-bottom:1px solid rgba(255,255,255,.08); }
  .sq-kv-grid,.sq-attrs{ grid-template-columns:1fr; }
}

/* Squad · Lineup management — buttons, avatar, form & confirm modals */
.sql-meta{ justify-content:space-between; align-items:center; }
.sql-meta-l{ display:flex; align-items:baseline; gap:10px; }
.sq-mbtn{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:9px; cursor:pointer; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:var(--tx-1,#e8edf5); transition:all .15s ease; }
.sq-mbtn:hover{ background:rgba(255,255,255,.1); }

.sq-mbtn--danger:hover{ background:rgba(248,113,113,.16); }

.sq-plm-avatar{ overflow:hidden; position:relative; }
.sq-plm-photo{ width:100%; height:100%; object-fit:cover; display:block; }
.sq-plm-ph{ width:80%; height:80%; color:rgba(255,255,255,.92); }
.sq-plm-toolbar{ display:flex; gap:8px; padding:12px 24px; border-bottom:1px solid rgba(255,255,255,.08); background:rgba(0,0,0,.14); }

.sq-fm, .sq-cf{ position:fixed; inset:0; z-index:4100; display:flex; align-items:center; justify-content:center; padding:24px; }
.sq-cf{ z-index:4200; }
.sq-fm-backdrop, .sq-cf-backdrop{ position:absolute; inset:0; background:rgba(3,6,15,.74); backdrop-filter:blur(3px); }
.sq-fm-dialog{ position:relative; z-index:1; width:min(560px,100%); max-height:88vh; overflow:auto; border-radius:18px; background:linear-gradient(168deg,#121b32 0%,#0b1222 60%,#080d1a 100%); border:1px solid rgba(255,255,255,.12); box-shadow:0 40px 120px rgba(0,0,0,.7); }
.sq-cf-dialog{ position:relative; z-index:1; width:min(430px,100%); border-radius:16px; background:linear-gradient(168deg,#121b32 0%,#0b1222 100%); border:1px solid rgba(255,255,255,.12); box-shadow:0 40px 120px rgba(0,0,0,.7); padding:24px; }
.sq-fm-head{ display:flex; align-items:center; justify-content:space-between; padding:20px 22px; border-bottom:1px solid rgba(255,255,255,.08); }
.sq-fm-title{ font-size:18px; font-weight:700; color:#f5f8fc; letter-spacing:-.3px; }
.sq-fm-body{ padding:20px 22px; }
.sq-fm-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }

.sq-field--full{ grid-column:1 / -1; }

.sq-field input:focus, .sq-field select:focus{ border-color:#f4b740; }
.sq-field select{ cursor:pointer; }
.sq-fm-err{ color:#fca5a5; font-size:12.5px; margin-top:12px; min-height:1px; }
.sq-fm-foot{ display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid rgba(255,255,255,.08); }
.sq-cf-title{ font-size:17px; font-weight:700; color:#f5f8fc; margin-bottom:9px; }
.sq-cf-text{ font-size:13.5px; color:#aab4c5; line-height:1.55; margin-bottom:20px; }
.sq-cf-text b{ color:#f1f5f9; font-weight:700; }
.sq-cf-foot{ display:flex; justify-content:flex-end; gap:10px; }
.sq-btn-primary{ background:#f4b740; border:1px solid #f4b740; color:#0b1020; font-weight:700; font-size:13px; padding:10px 18px; border-radius:9px; cursor:pointer; transition:background .15s; }
.sq-btn-primary:hover{ background:#f6c45f; }
.sq-btn-ghost{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.14); color:#e8edf5; font-weight:600; font-size:13px; padding:10px 18px; border-radius:9px; cursor:pointer; transition:background .15s; }

@media (max-width:560px){ .sq-fm-grid{ grid-template-columns:1fr; } }

/* Lineup — enlarged player image area in profile modal */

.sq-plm-ph{ width:100%; height:100%; }
.sq-plm-head{ gap:18px; }

/* Squad · Formation */
.sqfp-toolbar{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding:18px 32px 6px; }
.sqfp-seg{ display:inline-flex; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:3px; }

.sqfp-stage{ display:flex; justify-content:center; padding:14px 32px 48px; }
.sqfp-pitch{ position:relative; width:min(460px,94%); aspect-ratio:2 / 3; border-radius:16px; overflow:hidden; background:linear-gradient(180deg,#1a7a3e 0%,#14692f 100%); border:1px solid rgba(255,255,255,.1); box-shadow:0 14px 50px rgba(0,0,0,.5); }

  var h = 0; s = String(s);

}
function _sqRng(p, key) { return (_sqSeed(p.id + ':' + key) % 1000) / 1000; }
function _sqVar(p, key, base, spread) {

}
function _sqStat(p, key, base, spread, min, max) {
  var v = Math.round(base + (_sqRng(p, key) * 2 - 1) * spread);
  return Math.max(min, Math.min(max, v));
}

function _sqSkillGroups(p) {
  if (p.cat === 'gk') {
    return [
      ['Shot stopping', ['Reflexes', 'One-on-one', 'Handling', 'Aerial reach', 'Positioning', 'Concentration']],
      ['Distribution',  ['Kicking', 'Throwing', 'Passing', 'First touch', 'Vision', 'Composure']],
      ['Physical',      ['Agility', 'Jumping', 'Strength', 'Stamina', 'Pace', 'Balance']],
    ];
  }
  return [
    ['Technical', ['Finishing', 'Dribbling', 'Passing', 'First touch', 'Crossing', 'Technique']],
    ['Mental',    ['Vision', 'Composure', 'Decisions', 'Positioning', 'Work rate', 'Teamwork']],
    ['Physical',  ['Pace', 'Acceleration', 'Stamina', 'Strength', 'Agility', 'Jumping']],
  ];
}
function _sqSkillVal(p, name) {
  var bias = 0;
  if (p.cat === 'fw' && (name === 'Finishing' || name === 'Pace' || name === 'Acceleration')) bias = 6;
  if (p.cat === 'df' && (name === 'Strength' || name === 'Positioning' || name === 'Jumping')) bias = 6;
  if (p.cat === 'mf' && (name === 'Passing' || name === 'Vision' || name === 'Stamina')) bias = 6;
  return _sqVar(p, name, p.qual + bias - 3, 11);
}
function _sqBarsList(items) {
  return items.map(function (it) {
    return '<div class="sq-attr"><span class="sq-attr-l">' + it[0] + '</span>'
      + _sqBar(it[1]) + '<span class="sq-attr-v">' + it[1] + '</span></div>';
  }).join('');
}
function _sqTopAttrs(p) {
  var g = _sqSkillGroups(p);
  var picks = [];
  g.forEach(function (grp) { picks.push(grp[1][0]); picks.push(grp[1][1]); });
  var items = picks.map(function (n) { return [n, _sqSkillVal(p, n)]; });
  items.sort(function (a, b) { return b[1] - a[1]; });
  return _sqBarsList(items.slice(0, 6));
}

function _sqPanelPlaystyle(p) {
  var poolFw = ['Runs in behind', 'Shoots with power', 'Gets into the box', 'Holds up the ball', 'Tries first-time shots'];
  var poolMf = ['Dictates tempo', 'Switches play', 'Late runs into box', 'Plays through balls', 'Presses high'];
  var poolDf = ['Steps out with the ball', 'Times tackles well', 'Marks tightly', 'Wins aerial duels', 'Stays back at all times'];
  var poolGk = ['Sweeps behind line', 'Distributes quickly', 'Stays on line', 'Commands the area'];
  var pool = p.cat === 'fw' ? poolFw : p.cat === 'mf' ? poolMf : p.cat === 'df' ? poolDf : poolGk;
  var traits = pool.slice(0, 3 + (_sqSeed(p.id) % 2)).map(function (t) { return '<span class="sq-trait">' + t + '</span>'; }).join('');
  var wrA = p.cat === 'fw' ? 'High' : p.cat === 'mf' ? 'High' : p.cat === 'df' ? 'Medium' : 'Low';
  var wrD = p.cat === 'df' ? 'High' : p.cat === 'mf' ? 'Medium' : p.cat === 'gk' ? 'High' : 'Low';
  var kv = [
    ['Preferred role', p.roles], ['Preferred foot', p.foot],
    ['Attacking work rate', wrA], ['Defensive work rate', wrD],
    ['Best position', p.pos], ['Tempo', p.cat === 'mf' ? 'Controls' : 'Adapts'],
  ];
  var kvHtml = kv.map(function (i) {
    return '<div class="sq-kv"><span class="sq-kv-l">' + i[0] + '</span><span class="sq-kv-v">' + _sqEsc(i[1]) + '</span></div>';
  }).join('');
  return '<div class="sq-panel">'
    + '<div class="sq-sec-title">Playing style</div>'
    + '<div class="sq-kv-grid">' + kvHtml + '</div>'
    + '<div class="sq-sec-title">Player traits</div>'
    + '<div class="sq-traits">' + traits + '</div>'
    + '</div>';
}
function _sqPanelStats(p) {
  var apps = _sqStat(p, 'apps', 26, 6, 10, 38);
  var gb = p.cat === 'fw' ? 15 : p.cat === 'mf' ? 6 : p.cat === 'df' ? 2 : 0;
  var ab = p.cat === 'fw' ? 5 : p.cat === 'mf' ? 8 : p.cat === 'df' ? 3 : 1;
  var goals = _sqStat(p, 'goals', gb, 4, 0, gb + 6);
  var assists = _sqStat(p, 'assists', ab, 3, 0, ab + 5);
  var mpg = _sqStat(p, 'mpg', 80, 8, 58, 90);
  var rating = (6.3 + (p.qual - 75) * 0.045 + p.form * 0.03);
  var rows = [
    ['Domestic League', Math.round(apps * 0.66)],
    ['Domestic Cup', Math.round(apps * 0.16)],
    ['Continental', Math.round(apps * 0.18)],
  ];
  var tot = { a: 0, g: 0, as: 0, m: 0 };
  var body = rows.map(function (r) {
    var a = Math.max(1, r[1]);
    var g = Math.round(goals * a / apps);
    var as = Math.round(assists * a / apps);
    var m = a * mpg;
    tot.a += a; tot.g += g; tot.as += as; tot.m += m;

  document.body.appendChild(inp);

function _sqReadPhoto(file) {
  var reader = new FileReader();
  reader.onload = function () {
    var img = new Image();
    img.onload = function () {
      var max = 320, w = img.width, h = img.height;
      if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
      else if (h >= w && h > max) { w = Math.round(w * max / h); h = max; }
      var data;
      try {
        var c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        data = c.toDataURL('image/jpeg', 0.82);
      } catch (e) { data = reader.result; }
      _sqFormPhoto = data; _sqUpdatePhotoPreview();
    };
    img.onerror = function () { _sqFormPhoto = reader.result; _sqUpdatePhotoPreview(); };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}
